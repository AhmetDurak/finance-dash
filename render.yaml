services:
  - type: web
    name: personal-dashboard
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: personal-dashboard-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: API_URL
        sync: false
      - key: DB_CLIENT_ID
        sync: false
      - key: DB_CLIENT_SECRET
        sync: false
      - key: DB_REDIRECT_URI
        sync: false
      - key: DB_API_BASE
        sync: false

databases:
  - name: personal-dashboard-db
    region: frankfurt
    plan: free
    databaseName: financedash
    user: financedash
